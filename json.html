<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Example</title>
</head>

<body>

<h2>JSON Message Example</h2>

<script>
let jsonText = '{"name":"John","email":"john@example.com","message":"Hello there"}';

const showMessage = () => {
  try {
    let user = JSON.parse(jsonText);
    console.log("Name:", user.name);
    console.log("Email:", user.email);
    console.log("Message:", user.message);
  } catch (error) {
    console.log("Error: Invalid JSON data");
  }
};

showMessage();
</script>

</body>
</html>
