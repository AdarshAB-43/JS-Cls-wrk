<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Check</title>
</head>
<body>

<script>
let jsonText = '{"name":"John","email":"john@example.com","feedback":"Thank you for your service"}';

const checkFeedback = () => {
  try {
    let data = JSON.parse(jsonText);
    if (/thank/i.test(data.feedback)) {
      console.log("Positive feedback received");
    } else {
      console.log("Feedback noted");
    }
  } catch (error) {
    console.log("Error: Invalid JSON data");
  }
};

checkFeedback();
</script>

</body>
</html>
