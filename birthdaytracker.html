<!DOCTYPE html>
<html>
<body>

<p id="demo"></p>

<script>


var friend = {
    name: "John",
    birthDate: "1999-07-05"
};


function getBirthdayDetails(friend) {

    var birth = new Date(friend.birthDate);

    var year = birth.getFullYear();
    var monthIndex = birth.getMonth();
    var day = birth.getDate();

    var months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    var monthName = months[monthIndex];


    var today = new Date();
    var age = today.getFullYear() - year;

    return friend.name + " was born on " + day + " " + monthName + ", " + year +
           " and is " + age + " years old.";
}

document.getElementById("demo").innerHTML = getBirthdayDetails(friend);

</script>

</body>
</html>
